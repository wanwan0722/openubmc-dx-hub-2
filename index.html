<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openUBMC 开发者体验管理平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ============================================================
   openUBMC 开发者体验管理平台
   编辑设计感 · 暖米纸张 · 深墨蓝 · 砖红 · 青绿
   （设计稿移植：保留原 styles.css 视觉，vanilla 实现）
   ============================================================ */

:root {
  --paper:      #f5f0e8;
  --paper-deep: #ece3d4;
  --card:       #fffdf7;
  --card-sunk:  #f8f3e9;
  --ink:        #1a1a2e;
  --ink-70:     rgba(26, 26, 46, 0.70);
  --ink-50:     rgba(26, 26, 46, 0.50);
  --ink-35:     rgba(26, 26, 46, 0.34);
  --ink-15:     rgba(26, 26, 46, 0.14);
  --ink-08:     rgba(26, 26, 46, 0.08);

  --brick:      #c84b31;
  --brick-soft: rgba(200, 75, 49, 0.10);
  --teal:       #2a7f7f;
  --teal-soft:  rgba(42, 127, 127, 0.12);

  --st-resolved:  #2a7f7f;
  --st-progress:  #c98a2b;
  --st-pending:   #908a7d;

  --pingfang: "PingFang SC", "苹方-简", -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Noto Sans SC", system-ui, sans-serif;
  --serif: var(--pingfang);
  --sans:  var(--pingfang);
  --mono:  var(--pingfang);

  --shadow-sm: 0 1px 2px rgba(26,26,46,0.05), 0 1px 0 rgba(26,26,46,0.03);
  --shadow-md: 0 8px 24px -12px rgba(26,26,46,0.22), 0 2px 6px -3px rgba(26,26,46,0.10);
  --shadow-lg: 0 24px 60px -28px rgba(26,26,46,0.40), 0 6px 16px -8px rgba(26,26,46,0.12);

  --radius:    14px;
  --radius-lg: 20px;
  --maxw: 1240px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--paper); color: var(--ink);
  font-family: var(--sans);
  font-variant-numeric: tabular-nums;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body::before {
  content: ""; position: fixed; inset: 0;
  pointer-events: none; z-index: 0; opacity: 0.5;
  background-image:
    radial-gradient(rgba(26,26,46,0.025) 0.5px, transparent 0.5px),
    radial-gradient(rgba(26,26,46,0.02) 0.5px, transparent 0.5px);
  background-size: 22px 22px, 17px 17px;
  background-position: 0 0, 9px 11px;
}

#root { position: relative; z-index: 1; }
::selection { background: var(--brick); color: #fff; }

.serif { font-family: var(--serif); }
.mono  { font-family: var(--mono); }
.eyebrow {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-50); font-weight: 500;
}
.kicker-rule { display: inline-flex; align-items: center; gap: 10px; }
.kicker-rule::before { content: ""; width: 22px; height: 1px; background: var(--brick); }

/* ---------- 骨架 ---------- */
.app { min-height: 100vh; }
.shell { max-width: var(--maxw); margin: 0 auto; padding: 0 40px 96px; }

/* ---------- 顶部刊头 ---------- */
.masthead {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--ink-15);
}
.masthead-inner {
  max-width: var(--maxw); margin: 0 auto; padding: 0 40px;
  display: flex; align-items: center; gap: 28px; height: 68px;
}
.brand { display: flex; align-items: baseline; gap: 12px; cursor: pointer; }
.brand-mark {
  width: 26px; height: 26px; border-radius: 7px; background: var(--ink);
  position: relative; align-self: center; display: grid; place-items: center; flex: none;
}
.brand-mark::after { content: ""; width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--brick); }
.brand-name { font-family: var(--serif); font-weight: 700; font-size: 19px; letter-spacing: 0.01em; color: var(--ink); }
.brand-sub { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em; color: var(--ink-50); text-transform: uppercase; }

.mast-nav { display: flex; gap: 4px; margin-left: auto; }
.mast-nav button {
  font-family: var(--sans); font-size: 14px; color: var(--ink-70);
  background: none; border: none; cursor: pointer; padding: 8px 14px;
  border-radius: 9px; transition: all 0.16s; position: relative; font-weight: 500;
}
.mast-nav button:hover { background: var(--ink-08); color: var(--ink); }
.mast-nav button.active { color: var(--ink); }
.mast-nav button.active::after {
  content: ""; position: absolute; left: 14px; right: 14px; bottom: 1px;
  height: 2px; background: var(--brick); border-radius: 2px;
}
.mast-meta { display: flex; align-items: center; gap: 16px; padding-left: 20px; margin-left: 4px; border-left: 1px solid var(--ink-15); }
.mast-period {
  font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--ink);
  background: var(--card); border: 1px solid var(--ink-15); padding: 4px 9px; border-radius: 7px; white-space: nowrap;
}
.mast-updated { font-family: var(--mono); font-size: 11px; color: var(--ink-50); }

/* ---------- 区块标题 ---------- */
.section { margin-top: 56px; position: relative; }
.section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 22px; }
.section-title { font-family: var(--serif); font-weight: 700; font-size: 26px; letter-spacing: 0.01em; margin: 0; color: var(--ink); }
.section-note { font-size: 13px; color: var(--ink-50); max-width: 360px; text-align: right; }

/* ---------- 卡片 ---------- */
.card { background: var(--card); border: 1px solid var(--ink-15); border-radius: var(--radius); box-shadow: var(--shadow-sm); }

/* ---------- 徽章 / 标签 ---------- */
.badge {
  display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono);
  font-size: 11.5px; font-weight: 600; letter-spacing: 0.02em;
  padding: 3px 9px 3px 8px; border-radius: 100px; white-space: nowrap;
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.badge.resolved   { background: var(--teal-soft);  color: #1f5e5e; }
.badge.resolved   .dot { background: var(--st-resolved); }
.badge.inProgress { background: rgba(201,138,43,0.14); color: #8a5d12; }
.badge.inProgress .dot { background: var(--st-progress); }
.badge.pending    { background: rgba(144,138,125,0.16); color: #5f5a50; }
.badge.pending    .dot { background: var(--st-pending); }
.tag {
  display: inline-flex; align-items: center; font-family: var(--mono); font-size: 11px;
  color: var(--ink-70); background: var(--card-sunk); border: 1px solid var(--ink-15);
  padding: 3px 8px; border-radius: 6px; white-space: nowrap;
}
.tag.prio-高 { color: var(--brick); border-color: rgba(200,75,49,0.35); background: var(--brick-soft); }
.tag.prio-中 { color: #8a5d12; border-color: rgba(201,138,43,0.3); background: rgba(201,138,43,0.10); }
.tag.prio-低 { color: var(--ink-50); }

/* ============================================================ 首页 · 北极星 HERO */
.hero { margin-top: 40px; display: grid; grid-template-columns: 1.05fr 1fr; gap: 0; position: relative; }
.hero-left { background: var(--ink); color: var(--paper); border-radius: var(--radius-lg) 0 0 var(--radius-lg); padding: 40px 42px 38px; position: relative; overflow: hidden; }
.hero-left::after { content: ""; position: absolute; right: -60px; top: -60px; width: 200px; height: 200px; border-radius: 50%; border: 1px solid rgba(245,240,232,0.10); }
.hero-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(245,240,232,0.55); display: inline-flex; align-items: center; gap: 10px; white-space: nowrap; }
.hero-eyebrow::before { content: ""; width: 22px; height: 1px; background: var(--brick); }
.bignum { display: flex; align-items: baseline; gap: 4px; margin: 22px 0 6px; }
.bignum-row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
.bignum-row .bignum { margin: 22px 0 6px; }
.bignum-row .delta { margin-bottom: 18px; }
.bignum .n { font-family: var(--mono); font-weight: 700; font-size: 104px; line-height: 0.85; letter-spacing: -0.04em; color: var(--paper); }
.bignum .u { font-family: var(--serif); font-size: 30px; color: rgba(245,240,232,0.75); margin-left: 4px; }
.delta { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 14px; font-weight: 600; padding: 5px 11px; border-radius: 100px; margin-top: 4px; white-space: nowrap; }
.delta.good { background: rgba(42,127,127,0.22); color: #7fd6d6; }
.delta.bad  { background: rgba(200,75,49,0.22); color: #ff9d85; }
.delta .arrow { font-size: 15px; }
.hero-takeaway { margin-top: 26px; padding-top: 22px; border-top: 1px solid rgba(245,240,232,0.14); }
.hero-conclusion { font-family: var(--serif); font-size: 17px; line-height: 1.7; font-weight: 500; color: rgba(245,240,232,0.94); }
.focus-flag { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 14px; white-space: nowrap; background: var(--brick); color: #fff; font-size: 12.5px; font-weight: 600; letter-spacing: 0.03em; padding: 6px 12px 6px 10px; border-radius: 8px; }

.hero-right { background: var(--card); border: 1px solid var(--ink-15); border-left: none; border-radius: 0 var(--radius-lg) var(--radius-lg) 0; padding: 32px 34px; display: flex; flex-direction: column; }
.hero-right .chart-head { display: flex; align-items: baseline; justify-content: space-between; }
.hero-right .chart-title { font-family: var(--serif); font-weight: 600; font-size: 16px; }
.spark-wrap { flex: 1; margin-top: 18px; min-height: 200px; height: 200px; position: relative; }
.spark-axis { display: flex; justify-content: space-between; margin-top: 8px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-50); }
.spark-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
.spark-stat { background: var(--card-sunk); border: 1px solid var(--ink-08); border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 2px; }
.spark-stat.now { border-color: rgba(200,75,49,0.30); background: var(--brick-soft); }
.spark-stat .ss-label { font-size: 11.5px; letter-spacing: 0.06em; color: var(--ink-50); }
.spark-stat .ss-val { font-weight: 800; font-size: 34px; line-height: 1.05; letter-spacing: -0.02em; color: var(--ink); }
.spark-stat.now .ss-val { color: var(--brick); }
.spark-stat .ss-val small { font-size: 15px; font-weight: 600; color: var(--ink-50); margin-left: 2px; }
.spark-stat.now .ss-val small { color: rgba(200,75,49,0.7); }
.spark-stat .ss-sub { font-size: 11px; color: var(--ink-50); margin-top: 2px; }

/* ============================================================ 问题闭环概览 */
.loop2 { display: grid; grid-template-columns: 1.55fr 1fr; gap: 18px; align-items: stretch; position: relative; }
.loop-pending { padding: 22px 24px 10px; display: flex; flex-direction: column; }
.lp-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--ink-08); }
.lp-lead { display: flex; align-items: center; gap: 14px; }
.lp-lead .ls-num { font-weight: 800; font-size: 44px; line-height: 1; letter-spacing: -0.02em; color: #5f5a50; }
.lp-title { font-family: var(--serif); font-weight: 700; font-size: 18px; }
.lp-sub { font-size: 12px; color: var(--ink-50); margin-top: 2px; }
.lp-jump { display: inline-flex; align-items: center; gap: 7px; flex: none; background: var(--ink); color: var(--paper); border: none; cursor: pointer; font-size: 13px; font-weight: 600; padding: 9px 15px; border-radius: 9px; transition: all 0.16s; font-family: inherit; }
.lp-jump:hover { background: var(--brick); transform: translateX(2px); }
.lp-jump svg { transition: transform 0.18s; }
.lp-jump:hover svg { transform: translateX(3px); }
.lp-list { list-style: none; margin: 0; padding: 4px 0 0; }
.lp-item { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; padding: 13px 8px 13px 4px; border-bottom: 1px dashed var(--ink-08); cursor: pointer; border-radius: 8px; transition: background 0.14s, padding 0.14s; }
.lp-item:last-child { border-bottom: none; }
.lp-item:hover { background: var(--card-sunk); padding-left: 12px; padding-right: 12px; }
.lp-rank { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--brick); align-self: start; padding-top: 2px; }
.lp-content { font-size: 14px; line-height: 1.5; color: var(--ink); }
.lp-side { display: flex; align-items: center; gap: 10px; flex: none; }
.lp-votes { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 12px; color: var(--ink-50); white-space: nowrap; }

.loop-summary { padding: 22px 24px; display: flex; flex-direction: column; }
.lsum-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-50); margin-bottom: 6px; }
.lsum-row { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; background: none; border: none; cursor: pointer; padding: 16px 6px; border-bottom: 1px solid var(--ink-08); transition: padding 0.14s; font-family: inherit; }
.lsum-row:hover { padding-left: 12px; }
.lsum-row .dot { width: 9px; height: 9px; }
.lsum-label { font-size: 14px; color: var(--ink); }
.lsum-num { font-weight: 800; font-size: 30px; line-height: 1; margin-left: auto; letter-spacing: -0.02em; }
.lsum-ar { color: var(--ink-35); transition: transform 0.16s, color 0.16s; }
.lsum-row:hover .lsum-ar { color: var(--brick); transform: translateX(3px); }
.lsum-closure { margin-top: 18px; }
.lsum-closure .lc-top { display: flex; align-items: baseline; justify-content: space-between; }
.lsum-closure .lc-label { font-size: 13px; color: var(--ink-70); }
.lsum-closure .lc-pct { font-weight: 800; font-size: 26px; letter-spacing: -0.02em; color: var(--teal); }
.progress-track { margin-top: 14px; height: 10px; border-radius: 100px; background: var(--card-sunk); border: 1px solid var(--ink-08); overflow: hidden; position: relative; }
.progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--teal), #3a9a9a); position: relative; transition: width 0.9s cubic-bezier(.2,.7,.2,1); }
.progress-sub { margin-top: 9px; font-family: var(--mono); font-size: 11px; color: var(--ink-50); }

/* ============================================================ 旅程流程 */
.journey-embed { position: relative; }
.journey-scroll { overflow-x: auto; padding: 8px 2px 20px; margin: 0 -4px; }
.journey-flow { display: flex; gap: 0; align-items: stretch; min-width: max-content; padding: 4px; }
.stage { width: 158px; flex: none; cursor: pointer; position: relative; background: var(--card); border: 1px solid var(--ink-15); border-radius: 12px; padding: 16px 15px 15px; transition: all 0.18s; z-index: 2; }
.stage:hover { border-color: var(--ink-35); box-shadow: var(--shadow-sm); transform: translateY(-2px); }
.stage.active { border-color: var(--ink); box-shadow: var(--shadow-md); transform: translateY(-2px); }
.stage.focus { border-color: var(--brick); }
.stage-focus-badge { position: absolute; top: -10px; left: 12px; display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: #fff; background: var(--brick); padding: 2px 7px 2px 6px; border-radius: 5px; letter-spacing: 0.04em; }
.stage-focus-badge svg { width: 10px; height: 10px; }
.stage-idx { font-family: var(--mono); font-size: 10.5px; color: var(--ink-35); }
.stage-name { font-family: var(--serif); font-weight: 700; font-size: 16px; margin: 4px 0 12px; }
.stage-metrics { display: flex; gap: 14px; }
.stage-metric .n { font-family: var(--mono); font-weight: 700; font-size: 20px; line-height: 1; white-space: nowrap; }
.stage-metric .n small { font-size: 11px; font-weight: 600; color: var(--ink-50); margin-left: 1px; }
.stage-metric .l { font-family: var(--mono); font-size: 9.5px; color: var(--ink-50); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.stage-metric.prob .n { color: var(--brick); }
.stage-connector { width: 26px; flex: none; align-self: center; height: 1.5px; background: var(--ink-15); position: relative; z-index: 1; }
.stage-connector::after { content: "›"; position: absolute; right: 4px; top: 50%; transform: translateY(-50%); color: var(--ink-35); font-size: 16px; }

.stage-detail { margin-top: 26px; background: var(--card); border: 1px solid var(--ink-15); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-md); }
.sd-head { background: var(--ink); color: var(--paper); padding: 24px 30px; display: flex; align-items: center; gap: 22px; }
.sd-head .sd-name { font-family: var(--serif); font-weight: 700; font-size: 24px; white-space: nowrap; }
.sd-head .sd-stat { display: flex; flex-direction: column; }
.sd-head .sd-stat .n { font-family: var(--mono); font-weight: 700; font-size: 26px; line-height: 1; }
.sd-head .sd-stat .l { font-family: var(--mono); font-size: 10px; color: rgba(245,240,232,0.6); margin-top: 4px; letter-spacing: 0.05em; }
.sd-head .sd-divider { width: 1px; align-self: stretch; background: rgba(245,240,232,0.18); }
.sd-close { margin-left: auto; background: rgba(245,240,232,0.12); border: none; color: var(--paper); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; font-size: 18px; transition: background 0.15s; display:grid; place-items:center; }
.sd-close:hover { background: rgba(245,240,232,0.24); }
.sd-body { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 0; }
.sd-col { padding: 24px 28px; border-right: 1px solid var(--ink-08); }
.sd-col:last-child { border-right: none; }
.sd-col-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-50); margin-bottom: 16px; }
.voc-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--ink-08); font-size: 13.5px; line-height: 1.5; color: var(--ink); }
.voc-item:last-child { border-bottom: none; }
.voc-rank { font-family: var(--mono); font-size: 12px; color: var(--brick); font-weight: 700; flex: none; }
.sd-insight { font-family: var(--serif); font-size: 16px; line-height: 1.65; font-weight: 500; color: var(--ink); }
.sd-insight-tag { margin-top: 14px; }
.minitrend { display: flex; align-items: flex-end; gap: 5px; height: 56px; }
.minitrend .mt-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.minitrend .mt-bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--ink-15); }
.minitrend .mt-bar.last { background: var(--brick); }
.minitrend .mt-v { font-family: var(--mono); font-size: 9px; color: var(--ink-50); }

/* ============================================================ 子视图页头 */
.subhead { margin-top: 36px; padding-bottom: 24px; border-bottom: 2px solid var(--ink); }
.crumb { font-family: var(--mono); font-size: 12px; color: var(--ink-50); display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.crumb button { background: none; border: none; font-family: var(--mono); font-size: 12px; color: var(--brick); cursor: pointer; padding: 0; }
.crumb button:hover { text-decoration: underline; }
.subtitle { font-family: var(--serif); font-weight: 700; font-size: 34px; margin: 0; }
.sublede { font-size: 15px; color: var(--ink-70); margin-top: 10px; max-width: 620px; line-height: 1.6; }

/* ============================================================ 领域问题板 */
.board-layout { display: grid; grid-template-columns: 232px 1fr; gap: 28px; margin-top: 30px; align-items: start; }
.filters { position: sticky; top: 84px; }
.filter-group { margin-bottom: 24px; }
.filter-group h4 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-50); margin: 0 0 11px; font-weight: 600; }
.chip { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; color: var(--ink-70); background: transparent; border: 1px solid var(--ink-15); border-radius: 8px; padding: 6px 11px; margin: 0 7px 7px 0; transition: all 0.15s; font-family: var(--sans); }
.chip:hover { border-color: var(--ink-35); color: var(--ink); }
.chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.chip .cnt { font-family: var(--mono); font-size: 10.5px; opacity: 0.6; }
.filter-reset { font-family: var(--mono); font-size: 11.5px; color: var(--brick); cursor: pointer; background: none; border: none; padding: 0; margin-top: 4px; display: inline-flex; align-items: center; gap: 6px; }
.filter-reset:hover { text-decoration: underline; }
.board-main { min-width: 0; }
.board-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--ink-15); }
.board-count { font-family: var(--serif); font-size: 16px; }
.board-count b { font-family: var(--mono); }

/* ============================================================ 页脚 */

<body>

<div id="loading"><span class="loading-text">正在加载数据…</span></div>

<div class="app" id="root" style="display:none">
  <!-- 顶部刊头 -->
  <header class="masthead">
    <div class="masthead-inner">
      <div class="brand" onclick="go('home')">
        <span class="brand-mark"></span>
        <div>
          <div class="brand-name">openUBMC 开发者体验</div>
          <div class="brand-sub">Developer Experience Hub</div>
        </div>
      </div>
      <nav class="mast-nav" id="mast-nav"></nav>
      <div class="mast-meta">
        <span class="mast-period" id="mast-period">—</span>
        <span class="mast-updated" id="mast-updated">—</span>
      </div>
    </div>
  </header>

  <main class="shell">
    <div class="view" id="view-home"></div>
    <div class="view" id="view-journey"></div>
    <div class="view" id="view-board"></div>
    <div class="view" id="view-insights"></div>

    <footer class="foot">
      <span id="foot-left">openUBMC 开发者体验管理平台</span>
      <span id="foot-right">内部研判使用</span>
    </footer>
  </main>
</div>

<script>
/* ============================================================
   引擎层（保留）：数据加载 loadAll + Papa.parse + Chart.js
   ============================================================ */
let appData = {
  config: null, personas: null, journey: null,
  voc: null, insights: null, timeCost: null, score: null
};
let charts = {};

/* —— CSV 解析（Papa.parse，保留） —— */
function parseCSV(text) {
  const result = Papa.parse(text, { header: true, skipEmptyLines: true });
  return result.data;
}

/* —— 加载 data/ 下 7 个文件（保留，一行未删） —— */
async function loadAll() {
  const base = './data/';
  const [configR, personasR, journeyR, vocR, insightsR, timeR, scoreR] = await Promise.all([
    fetch(base + 'config.json'),
    fetch(base + 'personas.json'),
    fetch(base + 'journey.json'),
    fetch(base + 'voc.csv'),
    fetch(base + 'insights.json'),
    fetch(base + 'time_cost.csv'),
    fetch(base + 'score.csv')
  ]);

  appData.config    = await configR.json();
  appData.personas  = await personasR.json();
  appData.journey   = await journeyR.json();
  appData.voc       = parseCSV(await vocR.text());
  appData.insights  = await insightsR.json();
  appData.timeCost  = parseCSV(await timeR.text());
  appData.score     = parseCSV(await scoreR.text());
}

/* ============================================================
   模型层：把 7 个真实数据文件转换成视图所需结构
   （取代设计稿中的静态假数据 window.DATA）
   ============================================================ */
const STATUS_TO_KEY = { '待处理': 'pending', '进行中': 'inProgress', '已解决': 'resolved' };
const KEY_TO_STATUS = { pending: '待处理', inProgress: '进行中', resolved: '已解决' };
const PRIO_WEIGHT   = { '高': 3, '中': 2, '低': 1 };

let MODEL = {};
let state = {
  view: 'home',
  homeStage: null,
  journeyStage: null,
  board: { status: null, stage: null, category: null, priority: null },
  openIssues: {},
  openInsights: {}
};

function shortPeriod(p) { return (p || '').replace(/^20(\d\d)-Q(\d)$/, '$1Q$2'); }

function buildModel() {
  const cfg = appData.config;
  const tc  = appData.timeCost;
  const jr  = appData.journey;
  const voc = appData.voc;
  const ins = appData.insights;

  const latest = tc[tc.length - 1];
  const prev   = tc[tc.length - 2];

  // —— 北极星：全流程耗时 ——
  const fullTrend = tc.map(r => parseFloat(r.full_process_days));
  const value   = parseFloat(latest.full_process_days);
  const prevVal = parseFloat(prev.full_process_days);
  const peak    = Math.max(...fullTrend);
  const deltaPct = Math.round((value - prevVal) / prevVal * 100);
  const cumPct   = Math.round((value - peak) / peak * 100);

  const northStar = {
    value, unit: '天',
    trend: fullTrend,
    trendLabels: tc.map(r => shortPeriod(r.period)),
    deltaPct, deltaGood: deltaPct <= 0,
    peak, cumPct,
    conclusion: cfg.headline,
    focus: cfg.spotlight.stage,
    focusReason: cfg.spotlight.reason
  };

  // —— 问题闭环：来自 voc.csv 真实状态计数 ——
  const cnt = s => voc.filter(v => v.status === s).length;
  const loop = {
    pending:    cnt('待处理'),
    inProgress: cnt('进行中'),
    resolved:   cnt('已解决')
  };
  loop.total = loop.pending + loop.inProgress + loop.resolved;
  loop.closureRate = loop.total ? loop.resolved / loop.total : 0;

  // —— 旅程阶段：journey.json + time_cost.csv + voc.csv + insights.json ——
  const stages = jr.map(s => {
    const hasCol = latest[s.id] !== undefined;
    const days   = hasCol ? parseFloat(latest[s.id] || 0) : 0;
    const trend  = tc.map(r => (r[s.id] !== undefined ? parseFloat(r[s.id] || 0) : 0));
    const stageVoc = voc.filter(v => v.journey_stage === s.label);
    const topVoc   = stageVoc.slice(0, 3).map(v => v.content);
    const rel = ins.find(i => (i.stages_affected || []).includes(s.label));
    return {
      id: s.id, name: s.label,
      days, hasDays: hasCol,
      problems: s.open_issues, resolved: s.resolved_issues,
      trend, topVoc,
      insight: rel ? rel.title : '本阶段暂无关联洞察',
      insightPeriod: rel ? rel.period : '',
      focus: s.label === cfg.spotlight.stage
    };
  });

  // —— 领域问题板：直接来自 voc.csv（精简版，无 owner/votes/timeline）——
  const problems = voc.map(v => ({
    id: v.id,
    stageLabel: v.journey_stage,
    category: v.category,
    priority: v.priority,
    status: STATUS_TO_KEY[v.status] || 'pending',
    statusZh: v.status,
    content: v.content,
    source: v.source,
    dev: v.developer_id,
    date: v.date
  }));

  const categories = [...new Set(voc.map(v => v.category))];
  const priorities = ['高', '中', '低'].filter(p => voc.some(v => v.priority === p));

  // —— 洞察归档：insights.json ——
  const insights = ins.map(i => ({
    period: i.period,
    current: i.period === cfg.current_period,
    title: i.title,
    date: i.date,
    summary: (i.findings && i.findings[0]) || '',
    findings: i.findings || [],
    stages: i.stages_affected || [],
    quotes: i.quotes || []
  }));

  MODEL = {
    meta: { period: cfg.current_period, updated: cfg.last_updated, project: cfg.project },
    northStar, loop, stages, problems, categories, priorities, insights,
    personas: appData.personas
  };

  // 默认聚焦阶段
  const focusStage = stages.find(s => s.focus) || stages[0];
  state.homeStage    = focusStage.id;
  state.journeyStage = focusStage.id;
}

/* ============================================================
   图标（统一线性 SVG，取代 emoji）
   ============================================================ */
function icon(name, size) {
  size = size || 16;
  const a = 'fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"';
  const P = {
    flag:   '<path '+a+' d="M4 14s1-.8 3.2-.8S11 14.4 13 14.4 16 13.6 16 13.6V3.6s-1 .8-3 .8S9.2 3 7.2 3 4 3.8 4 3.8z"/><path '+a+' d="M4 18.5V3.8"/>',
    close:  '<path '+a+' d="M5 5l10 10M15 5L5 15"/>',
    check:  '<path '+a+' d="M4 10.5l3.5 3.5L16 5.5"/>',
    upvote: '<path '+a+' d="M10 15.5V4.5M5 9.5l5-5 5 5"/>',
    arrow:  '<path '+a+' d="M4 10h11M11 6l4 4-4 4"/>'
  };
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 20 20" style="display:inline-block;vertical-align:-0.15em;flex:none">'+(P[name]||'')+'</svg>';
}

/* ============================================================
   渲染：顶部导航
   ============================================================ */
const NAV_ITEMS = [
  { id: 'home',     label: '首页' },
  { id: 'journey',  label: '旅程全景' },
  { id: 'board',    label: '领域问题板' },
  { id: 'insights', label: '洞察归档' }
];

function renderNav() {
  document.getElementById('mast-nav').innerHTML = NAV_ITEMS.map(n =>
    '<button class="'+(state.view === n.id ? 'active' : '')+'" onclick="go(\''+n.id+'\')">'+n.label+'</button>'
  ).join('');
  document.getElementById('mast-period').textContent = MODEL.meta.period;
  document.getElementById('mast-updated').textContent = '更新于 ' + MODEL.meta.updated;
  document.getElementById('foot-left').textContent = 'openUBMC 开发者体验管理平台 · ' + MODEL.meta.period;
  document.getElementById('foot-right').textContent = 'VoC 数据截至 ' + MODEL.meta.updated + ' · 内部研判使用';
}

/* ============================================================
   渲染：首页概览（北极星 HERO + 闭环 + 内嵌旅程）
   ============================================================ */
function renderOverview() {
  const ns = MODEL.northStar, loop = MODEL.loop;

  // 待处理 Top5（按优先级权重→日期 排序，关注数缺失故以优先级替代）
  const topPending = MODEL.problems
    .filter(p => p.status === 'pending')
    .sort((a, b) => (PRIO_WEIGHT[b.priority] - PRIO_WEIGHT[a.priority]) || (b.date > a.date ? 1 : -1))
    .slice(0, 5);

  const arrowSm = icon('arrow', 14);
  const arrowRow = '<svg width="14" height="14" viewBox="0 0 20 20" class="lsum-ar" style="display:inline-block;vertical-align:-0.15em;flex:none"><path fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" d="M4 10h11M11 6l4 4-4 4"/></svg>';

  const html = `
    <section class="hero">
      <div class="hero-left">
        <div class="hero-eyebrow">本期北极星指标 · ${MODEL.meta.period}</div>
        <div class="bignum-row">
          <div class="bignum"><span class="n">${ns.value}</span><span class="u">${ns.unit}</span></div>
          <span class="delta ${ns.deltaGood ? 'good' : 'bad'}">
            <span class="arrow">${ns.deltaPct < 0 ? '↓' : '↑'}</span>${Math.abs(ns.deltaPct)}% 较上期
          </span>
        </div>
        <div style="font-size:14px;color:rgba(245,240,232,0.6);margin-bottom:4px;">全流程平均耗时</div>
        <div id="hero-takeaway"></div>
      </div>

      <div class="hero-right">
        <div class="chart-head">
          <span class="chart-title">全流程耗时趋势</span>
          <span class="eyebrow">近 ${ns.trend.length} 期 · 单位 天</span>
        </div>
        <div class="spark-stats">
          <div class="spark-stat">
            <span class="ss-label">峰值耗时</span>
            <span class="ss-val">${ns.peak}<small>天</small></span>
            <span class="ss-sub">${ns.trendLabels[ns.trend.indexOf(ns.peak)]} 历史高点</span>
          </div>
          <div class="spark-stat now">
            <span class="ss-label">当前耗时</span>
            <span class="ss-val">${ns.value}<small>天</small></span>
            <span class="ss-sub">累计 ${ns.cumPct <= 0 ? '↓' : '↑'} ${Math.abs(ns.cumPct)}%</span>
          </div>
        </div>
        <div class="spark-wrap"><canvas id="heroChart"></canvas></div>
        <div class="spark-axis">${ns.trendLabels.map(l => '<span>'+l+'</span>').join('')}</div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <div class="eyebrow kicker-rule" style="margin-bottom:10px;">问题闭环概览</div>
          <h2 class="section-title">本期反馈处理进展</h2>
        </div>
        <p class="section-note">全社区累计 ${MODEL.problems.length} 条在管 VoC，点击卡片可直接跳转看板</p>
      </div>

      <div class="loop2">
        <div class="card loop-pending">
          <div class="lp-head">
            <div class="lp-lead">
              <div class="ls-num">${loop.pending}</div>
              <div>
                <div class="lp-title">待处理</div>
                <div class="lp-sub">当前积压 · 按优先级 Top 5</div>
              </div>
            </div>
            <button class="lp-jump" onclick="goBoard('pending', null)">进入看板 ${arrowSm}</button>
          </div>
          <ul class="lp-list">
            ${topPending.map((p, i) => `
              <li class="lp-item" onclick="goBoard('pending', '${p.stageLabel}')">
                <span class="lp-rank">${String(i+1).padStart(2,'0')}</span>
                <span class="lp-content">${p.content}</span>
                <span class="lp-side">
                  <span class="tag">${p.stageLabel}</span>
                  <span class="lp-votes"><span class="tag prio-${p.priority}">${p.priority}优先</span></span>
                </span>
              </li>`).join('') || '<li style="padding:16px 4px;color:var(--ink-50);font-size:14px;">当前无待处理项</li>'}
          </ul>
        </div>

        <div class="card loop-summary">
          <div class="lsum-title">本期进展</div>
          <button class="lsum-row" onclick="goBoard('inProgress', null)">
            <span class="dot" style="background:var(--st-progress)"></span>
            <span class="lsum-label">进行中</span>
            <span class="lsum-num" style="color:#8a5d12">${loop.inProgress}</span>
            ${arrowRow}
          </button>
          <button class="lsum-row" onclick="goBoard('resolved', null)">
            <span class="dot" style="background:var(--st-resolved)"></span>
            <span class="lsum-label">本期已解决</span>
            <span class="lsum-num" style="color:#1f5e5e">${loop.resolved}</span>
            ${arrowRow}
          </button>
          <div class="lsum-closure">
            <div class="lc-top">
              <span class="lc-label">本期闭环率</span>
              <span class="lc-pct">${Math.round(loop.closureRate * 100)}%</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:${loop.closureRate*100}%"></div></div>
            <div class="progress-sub">已解决 ${loop.resolved} / 在管 ${loop.total} 条</div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <div class="eyebrow kicker-rule" style="margin-bottom:10px;">深入了解 · 旅程全景</div>
          <h2 class="section-title">从全局，走向细节</h2>
        </div>
        <p class="section-note">${MODEL.stages.length} 个旅程阶段的耗时与问题分布，点击任一阶段在下方查看详情</p>
      </div>
      <div class="journey-embed">
        <div class="journey-scroll"><div class="journey-flow" id="home-flow"></div></div>
        <div id="home-detail"></div>
      </div>
    </section>
  `;

  document.getElementById('view-home').innerHTML = html;
  renderSpotlight();
  renderStageFlow('home-flow', state.homeStage, 'selectHomeStage');
  renderStageDetail('home-detail', state.homeStage, false);
  renderCharts();
}

/* —— 北极星结论 + 焦点（保留 renderSpotlight 名） —— */
function renderSpotlight() {
  const ns = MODEL.northStar;
  const el = document.getElementById('hero-takeaway');
  if (!el) return;
  el.className = 'hero-takeaway';
  el.innerHTML =
    '<div class="focus-flag">' + icon('flag',13) + ' 本期焦点 · ' + ns.focus + '</div>' +
    '<div class="hero-conclusion">' + ns.conclusion + '</div>';
}

/* —— 画像（保留 renderPersonas 名）。新设计稿四视图未含画像区，
   personas.json 仍被加载并挂在 MODEL.personas，暂无展示位。 —— */
function renderPersonas() {
  MODEL.personas = appData.personas;
}

/* ============================================================
   渲染：旅程（流程 + 详情）—— 首页内嵌与旅程全景共用
   ============================================================ */
function renderStageFlow(targetId, activeId, selectFn) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.innerHTML = MODEL.stages.map((s, i) => {
    const cls = 'stage' + (s.id === activeId ? ' active' : '') + (s.focus ? ' focus' : '');
    return `
      <div class="${cls}" onclick="${selectFn}('${s.id}')">
        ${s.focus ? '<span class="stage-focus-badge">'+icon('flag',10)+' 焦点</span>' : ''}
        <div class="stage-idx">${String(i+1).padStart(2,'0')}</div>
        <div class="stage-name">${s.name}</div>
        <div class="stage-metrics">
          <div class="stage-metric"><div class="n">${s.hasDays ? s.days : '—'}<small>天</small></div><div class="l">耗时</div></div>
          <div class="stage-metric prob"><div class="n">${s.problems}</div><div class="l">问题</div></div>
        </div>
      </div>
      ${i < MODEL.stages.length - 1 ? '<div class="stage-connector"></div>' : ''}
    `;
  }).join('');
}

function renderStageDetail(targetId, stageId, closable) {
  const el = document.getElementById(targetId);
  if (!el) return;
  if (!stageId) { el.innerHTML = ''; return; }
  const s = MODEL.stages.find(x => x.id === stageId);
  if (!s) { el.innerHTML = ''; return; }

  const max = Math.max(...s.trend) || 1;
  const bars = s.trend.map((d, i) => `
    <div class="mt-col">
      <div class="mt-bar ${i === s.trend.length-1 ? 'last' : ''}" style="height:${(d/max)*44+6}px"></div>
      <div class="mt-v">${d}</div>
    </div>`).join('');

  const trendNote = s.trend[s.trend.length-1] < s.trend[0]
    ? `较 ${s.trend.length} 期前下降 ${(s.trend[0]-s.trend[s.trend.length-1]).toFixed(1)} 天，呈改善趋势。`
    : '耗时趋于平稳。';

  const vocHtml = s.topVoc.length
    ? s.topVoc.map((v, i) => `<div class="voc-item"><span class="voc-rank">${String(i+1).padStart(2,'0')}</span><span>${v}</span></div>`).join('')
    : `<div style="font-size:13px;color:var(--ink-50);display:inline-flex;align-items:center;gap:6px;"><span style="color:var(--teal)">${icon('check',15)}</span> 本阶段暂无积压反馈</div>`;

  el.innerHTML = `
    <div class="stage-detail">
      <div class="sd-head">
        <div class="sd-name">${s.name}</div>
        <div class="sd-divider"></div>
        <div class="sd-stat"><div class="n">${s.hasDays ? s.days+'天' : '—'}</div><div class="l">平均耗时</div></div>
        <div class="sd-stat"><div class="n" style="color:#ff9d85">${s.problems}</div><div class="l">在管问题</div></div>
        ${s.focus ? '<span style="margin-left:8px;display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;white-space:nowrap;background:var(--brick);color:#fff;padding:5px 10px 5px 9px;border-radius:7px;">'+icon('flag',12)+' 本期焦点</span>' : ''}
        ${closable ? '<button class="sd-close" onclick="closeJourneyDetail()">'+icon('close',16)+'</button>' : ''}
      </div>
      <div class="sd-body">
        <div class="sd-col">
          <div class="sd-col-title">耗时趋势 · 近 ${s.trend.length} 期</div>
          <div class="minitrend">${bars}</div>
          <div style="margin-top:16px;font-size:13px;color:var(--ink-70);line-height:1.6;">${trendNote}</div>
        </div>
        <div class="sd-col">
          <div class="sd-col-title">Top VoC · 高频反馈</div>
          ${vocHtml}
        </div>
        <div class="sd-col">
          <div class="sd-col-title">关联洞察</div>
          <div class="sd-insight">「${s.insight}」</div>
          <div class="sd-insight-tag">
            <button class="tag" style="cursor:pointer;color:var(--brick);border-color:var(--brick);" onclick="go('insights')">查看相关洞察归档 →</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderJourney() {
  const html = `
    <header class="subhead">
      <div class="crumb"><button onclick="go('home')">首页</button><span>/</span><span style="color:var(--ink)">旅程全景</span></div>
      <h1 class="subtitle">旅程全景</h1>
      <p class="sublede">开发者从了解到反馈的完整旅程，共 ${MODEL.stages.length} 个阶段。砖红数字为该阶段在管问题数 — 点击任意阶段展开详情。</p>
    </header>
    <section class="section" style="margin-top:30px;position:relative;">
      <div class="journey-scroll"><div class="journey-flow" id="journey-flow"></div></div>
      <div id="journey-detail"></div>
    </section>
  `;
  document.getElementById('view-journey').innerHTML = html;
  renderStageFlow('journey-flow', state.journeyStage, 'selectJourneyStage');
  renderStageDetail('journey-detail', state.journeyStage, true);
}

/* ============================================================
   渲染：图表（Chart.js，保留初始化代码）
   ============================================================ */
function renderCharts() {
  const ns = MODEL.northStar;
  const cv = document.getElementById('heroChart');
  if (!cv) return;
  if (charts.hero) { charts.hero.destroy(); }

  const ctx = cv.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 200);
  grad.addColorStop(0, 'rgba(200,75,49,0.16)');
  grad.addColorStop(1, 'rgba(200,75,49,0)');

  charts.hero = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ns.trendLabels,
      datasets: [{
        data: ns.trend,
        borderColor: '#c84b31',
        backgroundColor: grad,
        borderWidth: 2.5,
        pointBackgroundColor: '#c84b31',
        pointBorderColor: '#fffdf7',
        pointBorderWidth: 2,
        pointRadius: ns.trend.map((_, i) => i === ns.trend.length-1 ? 5 : 3.5),
        fill: true,
        tension: 0.35
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.parsed.y + ' 天' } }
      },
      scales: {
        y: { beginAtZero: false, grid: { color: 'rgba(26,26,46,0.07)' }, ticks: { display: false }, border: { display: false } },
        x: { grid: { display: false }, ticks: { display: false }, border: { display: false } }
      }
    }
  });
}

/* ============================================================
   渲染：领域问题板（精简版，来自 voc.csv 真实字段）
   ============================================================ */
function renderBoard() {
  const f = state.board;
  const all = MODEL.problems;
  const countBy = (key, val) => all.filter(p => p[key] === val).length;

  const filtered = all.filter(p =>
    (!f.status   || p.status === f.status) &&
    (!f.stage    || p.stageLabel === f.stage) &&
    (!f.category || p.category === f.category) &&
    (!f.priority || p.priority === f.priority)
  );
  const anyFilter = f.status || f.stage || f.category || f.priority;

  const statusChip = (k) =>
    '<button class="chip '+(f.status===k?'on':'')+'" onclick="toggleBoard(\'status\',\''+k+'\')">' +
    '<span class="dot" style="background:'+(k==='resolved'?'var(--st-resolved)':k==='inProgress'?'var(--st-progress)':'var(--st-pending)')+'"></span>' +
    KEY_TO_STATUS[k]+' <span class="cnt">'+countBy('status',k)+'</span></button>';

  const stageChips = MODEL.stages
    .filter(s => countBy('stageLabel', s.name) > 0)
    .map(s => '<button class="chip '+(f.stage===s.name?'on':'')+'" onclick="toggleBoard(\'stage\',\''+s.name+'\')">'+s.name+' <span class="cnt">'+countBy('stageLabel',s.name)+'</span></button>').join('');

  const catChips = MODEL.categories
    .map(c => '<button class="chip '+(f.category===c?'on':'')+'" onclick="toggleBoard(\'category\',\''+c+'\')">'+c+' <span class="cnt">'+countBy('category',c)+'</span></button>').join('');

  const prioChips = MODEL.priorities
    .map(p => '<button class="chip '+(f.priority===p?'on':'')+'" onclick="toggleBoard(\'priority\',\''+p+'\')">'+p+'优先 <span class="cnt">'+countBy('priority',p)+'</span></button>').join('');

  const issues = filtered.length === 0
    ? '<div class="board-empty"><div class="be-title">该领域暂无匹配的问题</div><button class="filter-reset" onclick="resetBoard()">'+icon('close',13)+' 清除筛选条件</button></div>'
    : filtered.map(p => {
        const isOpen = !!state.openIssues[p.id];
        return `
        <article class="issue ${isOpen?'open':''}">
          <div class="issue-head" onclick="toggleIssue('${p.id}')">
            <div class="issue-id">${p.id}</div>
            <div class="issue-body">
              <div class="issue-content">${p.content}</div>
              <div class="issue-meta">
                <span class="issue-owner"><span class="avatar">${p.dev ? p.dev.slice(-2) : '?'}</span>${p.dev||''}</span>
                <span class="tag">${p.stageLabel}</span>
                <span class="tag">${p.category}</span>
                <span class="tag prio-${p.priority}">${p.priority}优先</span>
                <span class="issue-votes">${p.source}</span>
              </div>
            </div>
            <div class="issue-right">
              <span class="badge ${p.status}"><span class="dot"></span>${p.statusZh}</span>
              <span class="issue-expand">${isOpen?'收起':'详情'} <span class="ar">›</span></span>
            </div>
          </div>
          ${isOpen ? `
          <div class="issue-timeline">
            <div class="tl-title">进展 · 当前状态</div>
            <div class="tl-item">
              <div class="tl-rail"><div class="tl-node"></div></div>
              <div>
                <div class="tl-date">${p.date} <span style="color:var(--brick);margin-left:8px;">最新</span></div>
                <div class="tl-text">${p.source}反馈 · 优先级 ${p.priority} · 当前${p.statusZh}</div>
              </div>
            </div>
          </div>` : ''}
        </article>`;
      }).join('');

  const html = `
    <header class="subhead">
      <div class="crumb"><button onclick="go('home')">首页</button><span>/</span><span style="color:var(--ink)">领域问题板</span></div>
      <h1 class="subtitle">领域问题板</h1>
      <p class="sublede">按状态、旅程阶段、问题分类、优先级筛选，快速定位你关注领域的反馈与进展。</p>
    </header>
    <div class="board-layout">
      <aside class="filters">
        <div class="filter-group"><h4>状态</h4>${statusChip('pending')}${statusChip('inProgress')}${statusChip('resolved')}</div>
        <div class="filter-group"><h4>旅程阶段</h4>${stageChips}</div>
        <div class="filter-group"><h4>问题分类</h4>${catChips}</div>
        <div class="filter-group"><h4>优先级</h4>${prioChips}</div>
        ${anyFilter ? '<button class="filter-reset" onclick="resetBoard()">'+icon('close',13)+' 清除全部筛选</button>' : ''}
      </aside>
      <main class="board-main">
        <div class="board-toolbar">
          <div class="board-count"><b>${filtered.length}</b> 条问题${anyFilter?'<span style="color:var(--ink-50);font-size:13px;"> · 已筛选</span>':''}</div>
          <div class="status-legend">
            <span class="sl"><span class="dot" style="background:var(--st-pending)"></span>待处理</span>
            <span class="sl"><span class="dot" style="background:var(--st-progress)"></span>进行中</span>
            <span class="sl"><span class="dot" style="background:var(--st-resolved)"></span>已解决</span>
          </div>
        </div>
        ${issues}
      </main>
    </div>
  `;
  document.getElementById('view-board').innerHTML = html;
}

/* ============================================================
   渲染：洞察归档（保留 renderArchive 名）
   ============================================================ */
function renderArchive() {
  const html = `
    <header class="subhead">
      <div class="crumb"><button onclick="go('home')">首页</button><span>/</span><span style="color:var(--ink)">洞察归档</span></div>
      <h1 class="subtitle">洞察归档</h1>
      <p class="sublede">按期次倒序沉淀的核心洞察。每期记录主结论、核心发现与关联旅程阶段 — 点击展开详情。</p>
    </header>
    <section class="insights-list">
      ${MODEL.insights.map(it => {
        const isOpen = state.openInsights[it.period] !== undefined ? state.openInsights[it.period] : it.current;
        return `
        <article class="insight ${it.current?'current':''} ${isOpen?'open':''}">
          <div class="insight-head" onclick="toggleInsight('${it.period}')">
            <div class="period-tag">${it.period}${it.current?'<span class="period-now">当期</span>':''}</div>
            <div>
              <div class="insight-title">${it.title}</div>
              <div class="insight-summary">${it.summary}</div>
            </div>
            <span class="insight-toggle">${isOpen?'收起':'展开'} <span class="ar">›</span></span>
          </div>
          ${isOpen ? `
          <div class="insight-detail">
            <div class="insight-detail-inner">
              <div>
                <div class="findings-title">核心发现 · ${it.findings.length} 条</div>
                ${it.findings.map((fd,i)=>'<div class="finding"><span class="finding-num">'+String(i+1).padStart(2,'0')+'</span><span class="finding-text">'+fd+'</span></div>').join('')}
                ${it.quotes.length?'<div class="insight-quote">"'+it.quotes[0].content+'" <span style="color:var(--ink-50);font-style:normal;">— '+it.quotes[0].stage+'</span></div>':''}
              </div>
              <div>
                <div class="related-title">关联旅程阶段</div>
                <div class="related-stages">${it.stages.map(s=>'<span class="stage-pill"><span class="dot" style="background:var(--teal)"></span>'+s+'</span>').join('')}</div>
                <button class="tag" style="margin-top:22px;cursor:pointer;color:var(--brick);border-color:var(--brick);" onclick="go('journey')">在旅程全景中查看 →</button>
              </div>
            </div>
          </div>` : ''}
        </article>`;
      }).join('')}
    </section>
  `;
  document.getElementById('view-insights').innerHTML = html;
}

/* ============================================================
   交互
   ============================================================ */
function go(view) {
  state.view = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  renderNav();
  if (view === 'board') renderBoard();
  if (view === 'insights') renderArchive();
  if (view === 'journey') renderJourney();
  if (view === 'home') renderCharts();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function goBoard(status, stageLabel) {
  state.board = { status: status || null, stage: stageLabel || null, category: null, priority: null };
  go('board');
}

function selectHomeStage(id) {
  state.homeStage = id;
  renderStageFlow('home-flow', id, 'selectHomeStage');
  renderStageDetail('home-detail', id, false);
}
function selectJourneyStage(id) {
  state.journeyStage = (state.journeyStage === id) ? null : id;
  renderStageFlow('journey-flow', state.journeyStage, 'selectJourneyStage');
  renderStageDetail('journey-detail', state.journeyStage, true);
}
function closeJourneyDetail() {
  state.journeyStage = null;
  renderStageFlow('journey-flow', null, 'selectJourneyStage');
  renderStageDetail('journey-detail', null, true);
}

function toggleBoard(type, val) {
  state.board[type] = (state.board[type] === val) ? null : val;
  renderBoard();
}
function resetBoard() { state.board = { status:null, stage:null, category:null, priority:null }; renderBoard(); }
function toggleIssue(id) { state.openIssues[id] = !state.openIssues[id]; renderBoard(); }
function toggleInsight(period) {
  const cur = state.openInsights[period] !== undefined
    ? state.openInsights[period]
    : (MODEL.insights.find(i => i.period === period) || {}).current;
  state.openInsights[period] = !cur;
  renderArchive();
}

/* ============================================================
   初始化
   ============================================================ */
async function init() {
  try {
    await loadAll();
    buildModel();
    renderNav();
    renderOverview();   // 内含 renderSpotlight + renderCharts
    renderPersonas();
    renderJourney();
    renderBoard();
    renderArchive();
    go('home');
    document.getElementById('root').style.display = 'block';
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    console.error(e);
    document.getElementById('loading').innerHTML =
      '<span class="loading-text" style="color:var(--brick)">数据加载失败，请检查 data/ 目录是否完整</span>';
  }
}

init();
</script>
</body>
</html>
